{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row g-4">
        {% for p in profielen %}
        <div class="col-md-3">
            <div class="card h-100 shadow-sm" style="width: 18rem;">
                <img src="https://placehold.co/300x200?text={{ p.naam }}" class="card-img-top" alt="profielfoto">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">{{ p.naam }}</h5>
                    <h6 class="card-subtitle mb-3 text-muted">{{ p.leeftijd }}</h6>
                    <p class="card-text">{{ p.bio }}</p>
                    <a href="{{ url_for('profiel_detail', user_id=p.gebruiker_id) }}" class="btn btn-outline-primary mt-auto">Bekijk profiel</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

</div>

{% endblock %}
