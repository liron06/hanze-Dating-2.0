{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4 text-center">
            
            <h1 class="mb-4">Inloggen</h1>
            
            <div class="form-container">
                <form action="/inloggen" id="login-form" method="post">
                    {{ form.hidden_tag() }}
                    
                    <p class="mb-3">{{ form.email.label }} <br> {{ form.email }}</p>
                    <p class="mb-3">{{ form.password.label}} <br> {{ form.password}}</p>
                    <p class="mt-4">{{ form.submit }}</p>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
